<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<title>Z-Network Admin — Login</title>
<style>
:root {
  --bg:          #f4f7fc;
  --bg-card:     #ffffff;
  --border:      #dde4f0;
  --text:        #1a2236;
  --text-soft:   #4d5e80;
  --text-muted:  #8a97b0;
  --accent:      #1A6FE8;
  --accent-dark: #1459BB;
  --accent-glow: rgba(26,111,232,0.13);
  --green:       #00C06A;
  --red:         #ef4444;
  --shadow:      0 2px 14px rgba(26,111,232,0.08);
  --shadow-lg:   0 8px 40px rgba(26,111,232,0.14);
}
body.dark {
  --bg:          #0b0d12;
  --bg-card:     #111520;
  --border:      #1e2535;
  --text:        #e8edf5;
  --text-soft:   #8a97b0;
  --text-muted:  #404d65;
  --accent:      #3B8EFF;
  --accent-dark: #2270e8;
  --accent-glow: rgba(59,142,255,0.15);
  --shadow:      0 2px 16px rgba(0,0,0,0.5);
  --shadow-lg:   0 8px 48px rgba(0,0,0,0.7);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:var(--bg);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  transition:background 0.3s,color 0.3s;
  padding:20px;
  position:relative;
  overflow:hidden;
}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input{font-family:inherit;border:none;outline:none;}

/* Background decorative mesh */
.bg-mesh {
  position:fixed;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}
.bg-mesh::before{
  content:'';
  position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(26,111,232,0.08) 0%, transparent 70%);
  top:-200px;right:-200px;
}
.bg-mesh::after{
  content:'';
  position:absolute;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle, rgba(0,192,106,0.06) 0%, transparent 70%);
  bottom:-100px;left:-100px;
}

/* Dark mode toggle (top-right) */
.dm-toggle{
  position:fixed;top:16px;right:16px;z-index:10;
  width:40px;height:22px;background:var(--border);
  border-radius:99px;cursor:pointer;
  transition:background 0.3s;
}
.dm-toggle.on{background:var(--accent);}
.dm-thumb{
  position:absolute;top:2px;left:2px;
  width:18px;height:18px;border-radius:50%;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.dm-toggle.on .dm-thumb{transform:translateX(18px);}

/* Card */
.login-card{
  position:relative;z-index:1;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow-lg);
  padding:40px 36px;
  width:100%;max-width:380px;
  animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Logo */
.login-logo{
  display:flex;align-items:center;gap:12px;
  margin-bottom:32px;
}
.logo-icon{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,#1A6FE8,#1459BB);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(26,111,232,0.3);
  flex-shrink:0;
}
.logo-text{font-size:1.15rem;font-weight:800;color:var(--text);letter-spacing:-0.02em;}
.logo-sub{font-size:0.72rem;color:var(--text-muted);font-weight:500;margin-top:1px;}

.login-heading{
  font-size:1.4rem;font-weight:800;
  color:var(--text);letter-spacing:-0.02em;
  margin-bottom:6px;
}
.login-sub{
  font-size:0.82rem;color:var(--text-muted);
  margin-bottom:28px;line-height:1.5;
}

/* Fields */
.field{margin-bottom:16px;}
.field-label{
  display:block;font-size:0.75rem;font-weight:600;
  color:var(--text-soft);margin-bottom:6px;
  letter-spacing:0.01em;
}
.field-wrap{
  position:relative;
  display:flex;align-items:center;
}
.field-input{
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:12px 42px 12px 14px;
  font-size:0.9rem;color:var(--text);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.field-input::placeholder{color:var(--text-muted);}
.field-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.field-icon{
  position:absolute;right:13px;
  color:var(--text-muted);
  display:flex;align-items:center;
  pointer-events:none;
}
.pw-toggle{
  position:absolute;right:13px;
  background:none;border:none;
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;padding:0;
  transition:color 0.15s;
}
.pw-toggle:hover{color:var(--accent);}

/* Error */
.login-error{
  display:none;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.25);
  color:var(--red);
  border-radius:10px;padding:10px 14px;
  font-size:0.8rem;font-weight:500;
  margin-bottom:16px;
  animation:shake 0.35s ease;
}
.login-error.show{display:flex;align-items:center;gap:8px;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}

/* Submit button */
.login-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  font-size:0.92rem;font-weight:700;
  background:linear-gradient(135deg,#1A6FE8,#1459BB);
  color:#fff;
  box-shadow:0 4px 18px rgba(26,111,232,0.3);
  transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
  position:relative;overflow:hidden;
  margin-top:4px;
}
.login-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(26,111,232,0.4);
}
.login-btn:active{transform:translateY(0);box-shadow:0 2px 10px rgba(26,111,232,0.3);}
.login-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}

.btn-spinner{
  display:none;
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
.login-btn.loading .btn-text{display:none;}
.login-btn.loading .btn-spinner{display:block;}

/* Footer */
.login-footer{
  margin-top:24px;
  text-align:center;
  font-size:0.72rem;color:var(--text-muted);
}
</style>
</head>
<body>

<div class="bg-mesh"></div>

<!-- Dark toggle -->
<div class="dm-toggle" id="dmToggle" onclick="toggleDark()">
  <div class="dm-thumb"></div>
</div>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 34 34" fill="none">
        <path d="M7 8h20L8 26h19" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="27" cy="27" r="4" fill="#00C06A"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Z-Network</div>
      <div class="logo-sub">Admin Dashboard</div>
    </div>
  </div>

  <div class="login-heading">Welcome back</div>
  <div class="login-sub">Sign in to your admin panel to manage vouchers and monitor sales.</div>

  <div class="login-error" id="loginError">
    <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
    <span id="loginErrorMsg">Invalid username or password.</span>
  </div>

  <div class="field">
    <label class="field-label" for="username">Username</label>
    <div class="field-wrap">
      <input class="field-input" type="text" id="username" placeholder="admin" autocomplete="username" autocapitalize="none"/>
      <span class="field-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </span>
    </div>
  </div>

  <div class="field">
    <label class="field-label" for="password">Password</label>
    <div class="field-wrap">
      <input class="field-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
      <button class="pw-toggle" id="pwToggle" onclick="togglePw()" type="button" aria-label="Toggle password">
        <svg id="eyeOpen" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        <svg id="eyeClosed" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
      </button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">Sign In</span>
    <span class="btn-spinner"></span>
  </button>

  <div class="login-footer">
    Z-Network &copy; 2025 &nbsp;·&nbsp; Secured Admin Area
  </div>
</div>

<script>
/* ── DARK MODE ── */
(function(){
  if(localStorage.getItem('zn_theme')==='dark'){
    document.body.classList.add('dark');
    document.getElementById('dmToggle').classList.add('on');
  }
})();

function toggleDark(){
  var isDark=document.body.classList.toggle('dark');
  document.getElementById('dmToggle').classList.toggle('on',isDark);
  localStorage.setItem('zn_theme',isDark?'dark':'light');
}

/* ── PW TOGGLE ── */
function togglePw(){
  var inp=document.getElementById('password');
  var isText=inp.type==='text';
  inp.type=isText?'password':'text';
  document.getElementById('eyeOpen').style.display=isText?'':'none';
  document.getElementById('eyeClosed').style.display=isText?'none':'';
}

/* ── CREDENTIALS (stored in localStorage, changeable in Settings) ── */
function getStoredCreds(){
  return {
    username: localStorage.getItem('zn_admin_user') || 'admin',
    password: localStorage.getItem('zn_admin_pass') || 'znetwork2025'
  };
}

/* ── LOGIN ── */
function doLogin(){
  var btn=document.getElementById('loginBtn');
  var err=document.getElementById('loginError');
  var errMsg=document.getElementById('loginErrorMsg');
  var user=document.getElementById('username').value.trim();
  var pass=document.getElementById('password').value;

  err.classList.remove('show');

  if(!user||!pass){
    errMsg.textContent='Please enter your username and password.';
    err.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.disabled=true;

  // Simulate slight delay for UX
  setTimeout(function(){
    var creds=getStoredCreds();
    if(user===creds.username && pass===creds.password){
      sessionStorage.setItem('zn_admin','1');
      window.location.href='admin.html';
    } else {
      btn.classList.remove('loading');
      btn.disabled=false;
      errMsg.textContent='Invalid username or password.';
      err.classList.add('show');
      document.getElementById('password').value='';
      document.getElementById('password').focus();
    }
  }, 600);
}

/* ── ENTER KEY ── */
document.addEventListener('keydown',function(e){
  if(e.key==='Enter') doLogin();
});

/* ── Redirect if already logged in ── */
if(sessionStorage.getItem('zn_admin')){
  window.location.replace('admin.html');
}
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
